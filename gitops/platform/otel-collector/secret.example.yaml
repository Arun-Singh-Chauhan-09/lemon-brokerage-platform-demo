# DO NOT COMMIT a real key. Create the secret locally with:
#   kubectl create secret generic datadog-secret \
#     --namespace observability \
#     --from-literal=api-key=YOUR_DATADOG_API_KEY
#
# This file documents the shape only. In production this would come from
# AWS Secrets Manager via External Secrets Operator (see docs/eks-migration.md).
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: observability
type: Opaque
stringData:
  api-key: "REPLACE_ME"
