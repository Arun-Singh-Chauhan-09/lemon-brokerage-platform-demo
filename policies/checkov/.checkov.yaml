# Checkov configuration. Scans Terraform + Kubernetes manifests.
framework:
  - terraform
  - kubernetes
directory:
  - infra
  - gitops
# Demo skips: kind/local has no real registry signing or network policy CNI.
# Documented intentionally rather than hidden — reviewers can see the tradeoff.
skip-check:
  - CKV_K8S_21   # default namespace (we use explicit namespaces anyway)
soft-fail: false
