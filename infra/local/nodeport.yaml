# Applied only locally to expose the API on localhost:8080.
# Not part of GitOps (kept out of gitops/ so EKS doesn't get a NodePort).
apiVersion: v1
kind: Service
metadata:
  name: brokerage-api-nodeport
  namespace: brokerage
spec:
  type: NodePort
  selector:
    app: brokerage-api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
